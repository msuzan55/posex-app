name: PosEx App

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: posex-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing
        if: ${{ secrets.POSEX_KEYSTORE_BASE64 != '' }}
        env:
          POSEX_KEYSTORE_BASE64: ${{ secrets.POSEX_KEYSTORE_BASE64 }}
          POSEX_KEYSTORE_PASSWORD: ${{ secrets.POSEX_KEYSTORE_PASSWORD }}
          POSEX_KEY_ALIAS: ${{ secrets.POSEX_KEY_ALIAS }}
          POSEX_KEY_PASSWORD: ${{ secrets.POSEX_KEY_PASSWORD }}
        run: |
          echo "$POSEX_KEYSTORE_BASE64" | base64 -d > android/app/posex-release.keystore
          cat > android/key.properties <<EOF
          storePassword=${POSEX_KEYSTORE_PASSWORD}
          keyPassword=${POSEX_KEY_PASSWORD}
          keyAlias=${POSEX_KEY_ALIAS}
          storeFile=posex-release.keystore
          EOF

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: posex-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish APK to PosEx backend
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.POSEX_APP_DEPLOY_TOKEN != ''
        env:
          POSEX_APP_DEPLOY_TOKEN: ${{ secrets.POSEX_APP_DEPLOY_TOKEN }}
          POSEX_APP_DEPLOY_URL: ${{ secrets.POSEX_APP_DEPLOY_URL }}
        run: |
          URL="${POSEX_APP_DEPLOY_URL:-https://posex.lk/api/v1/app/publish}"
          curl -f -S -X POST "$URL" \
            -H "X-App-Deploy-Token: ${POSEX_APP_DEPLOY_TOKEN}" \
            -F "version_code=${{ github.run_number }}" \
            -F "version_name=1.0.${{ github.run_number }}" \
            -F "release_notes=GitHub build ${{ github.run_number }}" \
            -F "apk=@build/app/outputs/flutter-apk/app-release.apk"
