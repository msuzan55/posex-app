name: PosEx App

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: posex-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup release signing
        env:
          POSEX_KEYSTORE_BASE64: ${{ secrets.POSEX_KEYSTORE_BASE64 }}
          POSEX_KEYSTORE_PASSWORD: ${{ secrets.POSEX_KEYSTORE_PASSWORD }}
          POSEX_KEY_PASSWORD: ${{ secrets.POSEX_KEY_PASSWORD }}
          POSEX_KEY_ALIAS: ${{ secrets.POSEX_KEY_ALIAS }}
        run: |
          if [ -n "$POSEX_KEYSTORE_BASE64" ]; then
            echo "$POSEX_KEYSTORE_BASE64" | base64 -d > android/app/posex-release.keystore
            printf '%s\n' \
              "storePassword=${POSEX_KEYSTORE_PASSWORD}" \
              "keyPassword=${POSEX_KEY_PASSWORD}" \
              "keyAlias=${POSEX_KEY_ALIAS}" \
              "storeFile=posex-release.keystore" \
              > android/key.properties
            echo "Release keystore configured for signed OTA updates."
          else
            echo "::warning::POSEX_KEYSTORE_* secrets missing — APK is debug-signed and in-app update install will fail."
          fi

      - name: Build release APK
        # Auto version on every CI build — no manual pubspec bump needed.
        # build-number = versionCode (for Android updates + in-app updater).
        run: |
          flutter build apk --release \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: posex-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Publish GitHub Release (for in-app update)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PosEx build ${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          asset_name: posex-app.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
