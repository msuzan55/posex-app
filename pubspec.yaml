name: posex_app
description: PosEx Windows app — simple WebView wrapper for https://posex.lk
publish_to: 'none'

version: 1.0.0+1
# GitHub Actions sets --build-name=1.0.{run} and --build-number={run} on every push.

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
