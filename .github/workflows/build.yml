name: PosEx App

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: posex-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons (incl. Windows .ico)
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Setup release signing
        env:
          POSEX_KEYSTORE_BASE64: ${{ secrets.POSEX_KEYSTORE_BASE64 }}
          POSEX_KEYSTORE_PASSWORD: ${{ secrets.POSEX_KEYSTORE_PASSWORD }}
          POSEX_KEY_PASSWORD: ${{ secrets.POSEX_KEY_PASSWORD }}
          POSEX_KEY_ALIAS: ${{ secrets.POSEX_KEY_ALIAS }}
        run: |
          if [ -n "$POSEX_KEYSTORE_BASE64" ]; then
            echo "$POSEX_KEYSTORE_BASE64" | base64 -d > android/app/posex-release.keystore
            printf '%s\n' \
              "storePassword=${POSEX_KEYSTORE_PASSWORD}" \
              "keyPassword=${POSEX_KEY_PASSWORD}" \
              "keyAlias=${POSEX_KEY_ALIAS}" \
              "storeFile=posex-release.keystore" \
              > android/key.properties
            echo "Release keystore configured for signed OTA updates."
          else
            echo "::warning::POSEX_KEYSTORE_* secrets missing — APK is debug-signed and in-app update install will fail."
          fi

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="1.0.${{ github.run_number }}" \
            --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: posex-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows app
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Cache WebView2 NuGet packages
        uses: actions/cache@v4
        with:
          path: build/windows/x64/packages
          key: posex-webview2-nuget-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            posex-webview2-nuget-${{ runner.os }}-

      - name: Build release Windows app
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          CL: "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
        run: |
          flutter build windows --release `
            --build-name="1.0.${{ github.run_number }}" `
            --build-number=${{ github.run_number }}
          Copy-Item install\launch_posex.cmd `
            build\windows\x64\runner\Release\launch_posex.cmd -Force

      - name: Zip portable Windows release (for in-app OTA)
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath posex-app-windows.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build PosEx-Setup.exe installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          & $iscc install\posex_installer.iss `
            "/DAppVersion=1.0.${{ github.run_number }}" `
            "/DReleaseDir=$PWD\build\windows\x64\runner\Release"

      - name: Stage Windows release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-files | Out-Null
          Copy-Item posex-app-windows.zip release-files/
          Copy-Item build/installer/PosEx-Setup.exe release-files/
          Get-ChildItem release-files

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: posex-app-release-windows
          path: release-files/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: posex-app-release-apk
          path: release

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: posex-app-release-windows
          path: release

      - name: Prepare release filenames
        run: |
          mv release/app-release.apk release/posex-app.apk
          test -f release/PosEx-Setup.exe || (echo "PosEx-Setup.exe missing from artifact" && exit 1)
          test -f release/posex-app-windows.zip || (echo "posex-app-windows.zip missing" && exit 1)
          ls -la release/

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PosEx build ${{ github.run_number }}
          body: |
            ## Android
            - **posex-app.apk** — install on phone/tablet (tap to install)

            ## Windows
            - **PosEx-Setup.exe** — recommended: one installer (like APK)
            - **posex-app-windows.zip** — portable folder (used by in-app update)
          files: |
            release/posex-app.apk
            release/PosEx-Setup.exe
            release/posex-app-windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
