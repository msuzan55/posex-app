name: PosEx Windows App

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: posex-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-windows:
    name: Build Windows app
    runs-on: windows-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Cache WebView2 NuGet packages
        uses: actions/cache@v4
        with:
          path: build/windows/x64/packages
          key: posex-webview2-nuget-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            posex-webview2-nuget-${{ runner.os }}-

      - name: Download Visual C++ redistributable (x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path install | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "install\vc_redist.x64.exe"

      - name: Build release Windows app
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          CL: "/D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS"
        run: |
          flutter build windows --release `
            --build-name="1.0.${{ github.run_number }}" `
            --build-number=${{ github.run_number }}
          Copy-Item install\launch_posex.cmd `
            "build\windows\x64\runner\Release\Launch PosEx.cmd" -Force
          Copy-Item install\vc_redist.x64.exe `
            build\windows\x64\runner\Release\vc_redist.x64.exe -Force
          Copy-Item install\README-WINDOWS.txt `
            build\windows\x64\runner\Release\README.txt -Force

      - name: Zip portable Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath posex-app-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: posex-app-release-windows
          path: posex-app-windows.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: posex-app-release-windows
          path: release

      - name: Prepare release
        run: |
          test -f release/posex-app-windows.zip || (echo "posex-app-windows.zip missing" && exit 1)
          ls -la release/

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PosEx Windows build ${{ github.run_number }}
          body: |
            ## Windows
            - **posex-app-windows.zip** — portable WebView app for PosEx

            ### How to install
            1. Download and **unzip** to a folder (e.g. `C:\PosEx\`)
            2. Run **`Launch PosEx.cmd`** (preferred) or `posex_app.exe`
            3. If it will not open, run **`vc_redist.x64.exe`** then try again
            4. Needs [WebView2 Runtime](https://go.microsoft.com/fwlink/p/?LinkId=2124703)

            Do **not** run the exe from inside the ZIP.
          files: |
            release/posex-app-windows.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
